<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Search Results | Classify</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

/* NAVBAR */

header{
display:flex;
justify-content:space-between;
padding:18px 40px;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:26px;
font-weight:bold;
background:linear-gradient(90deg,#6366f1,#a855f7);
-webkit-background-clip:text;
color:transparent;
}

/* RESULTS */

.results-section{
max-width:1000px;
margin:auto;
padding:60px 20px;
}

.results-title{
font-size:28px;
margin-bottom:40px;
}

/* INSTITUTE CARD */

.institute-card{

background:#0f172a;

border:1px solid #1e293b;

padding:20px;

border-radius:10px;

margin-bottom:20px;

display:flex;

justify-content:space-between;

align-items:center;

}

.institute-info h3{
margin:0;
}

.meta{
color:#94a3b8;
font-size:14px;
margin-top:6px;
}

.view-btn{

background:linear-gradient(90deg,#6366f1,#a855f7);

border:none;

padding:10px 18px;

border-radius:8px;

color:white;

cursor:pointer;

}

@media(max-width:768px){

.institute-card{
flex-direction:column;
align-items:flex-start;
gap:15px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">Classify</div>

</header>

<section class="results-section">

<h2 class="results-title" id="resultsTitle">Institutes</h2>


<div class="institute-card">

<div class="institute-info">

<h3>Allen Career Institute</h3>

<div class="meta">
⭐ 4.6 | Fees ₹1,40,000 | 1200 Students
</div>

</div>

<button class="view-btn">View Details</button>

</div>


<div class="institute-card">

<div class="institute-info">

<h3>Aakash Institute</h3>

<div class="meta">
⭐ 4.5 | Fees ₹1,35,000 | 1000 Students
</div>

</div>

<button class="view-btn">View Details</button>

</div>


<div class="institute-card">

<div class="institute-info">

<h3>Resonance</h3>

<div class="meta">
⭐ 4.4 | Fees ₹1,20,000 | 900 Students
</div>

</div>

<button class="view-btn">View Details</button>

</div>

</section>

<script>

const params = new URLSearchParams(window.location.search);

const exam = params.get("exam");
const city = params.get("city");

document.getElementById("resultsTitle").innerText =
`Results for ${exam} in ${city}`;

</script>

</body>

</html>
